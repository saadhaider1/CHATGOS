<div class="flex h-screen w-full bg-[#f0f2f5] p-6">
  <!-- Main Container -->
  <div class="flex w-full h-full bg-white rounded-2xl shadow-xl overflow-hidden">
    <!-- Left Sidebar: Profile & Nav -->
    <app-sidebar class="w-20 border-r border-gray-100 flex-shrink-0 flex flex-col"></app-sidebar>

    <!-- Chat Selection Area -->
    <div class="w-80 border-r border-gray-100 flex flex-col bg-white">
      <div class="p-6 pb-2">
        <h2 class="text-2xl font-bold text-gray-800">Messages</h2>
      </div>
      
      <!-- Chat List -->
      <div class="flex-1 overflow-y-auto">
         <div class="flex flex-col">
            <app-chat-list-item></app-chat-list-item>
         </div>
      </div>

      <!-- Start New Chat Button -->
      <div class="p-4">
        <button class="w-full bg-[#3b82f6] text-white rounded-xl py-3 px-4 flex items-center justify-center gap-2 hover:bg-blue-600 transition-colors">
          <span class="text-sm font-semibold">Start new chat</span>
        </button>
      </div>
    </div>

    <!-- Right Chat Window -->
    <app-chat-window class="flex-1"></app-chat-window>
  </div>
</div>
