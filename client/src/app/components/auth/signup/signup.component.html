<div class="min-h-screen w-full flex items-center justify-center relative overflow-hidden">
  <!-- Background Image -->
  <div class="absolute inset-0 z-0">
    <img 
      src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80" 
      alt="Mountains Background" 
      class="w-full h-full object-cover"
    >
    <!-- Overlay -->
    <div class="absolute inset-0 bg-gradient-to-r from-black/60 via-black/40 to-transparent"></div>
  </div>

  <!-- Content Container -->
  <div class="relative z-10 w-full max-w-6xl mx-auto px-6 py-12 flex items-center justify-between">
    
    <!-- Left Side - Text Content -->
    <div class="hidden md:block max-w-md text-white">
      <!-- Logo -->
      <div class="flex items-center gap-2 mb-8">
        <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
        </svg>
        <span class="text-2xl font-bold tracking-wider">CHATGOS</span>
      </div>

      <!-- Main Heading -->
      <h1 class="text-5xl lg:text-6xl font-bold leading-tight mb-6">
        JOIN<br>
        <span class="text-blue-400">THE</span><br>
        FAMILY
      </h1>

      <!-- Subtitle -->
      <p class="text-lg text-gray-200 mb-4">
        Start Your Journey Today.
      </p>
      <p class="text-sm text-gray-300 leading-relaxed">
        Create an account and join millions of users in seamless, real-time conversations. 
        Connect with friends, family, and colleagues instantly.
      </p>
    </div>

    <!-- Right Side - Signup Form -->
    <div class="w-full max-w-md mx-auto md:mx-0">
      <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 shadow-2xl border border-white/20">
        
        <!-- Mobile Logo (visible only on mobile) -->
        <div class="md:hidden flex items-center gap-2 mb-6 justify-center">
          <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
          </svg>
          <span class="text-xl font-bold text-white tracking-wider">CHATGOS</span>
        </div>

        <h2 class="text-2xl font-bold text-white mb-6 text-center md:text-left">Create Account</h2>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-lg text-red-200 text-sm">
          {{ errorMessage }}
        </div>

        <!-- Success Message -->
        <div *ngIf="successMessage" class="mb-4 p-3 bg-green-500/20 border border-green-500/30 rounded-lg text-green-200 text-sm">
          {{ successMessage }}
        </div>

        <!-- Username Field -->
        <div class="mb-4">
          <label class="block text-sm text-gray-200 mb-2">Username</label>
          <input 
            type="text" 
            [(ngModel)]="username"
            placeholder="Enter your username"
            class="w-full px-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all"
          >
        </div>

        <!-- Email Field -->
        <div class="mb-4">
          <label class="block text-sm text-gray-200 mb-2">Email</label>
          <input 
            type="email" 
            [(ngModel)]="email"
            placeholder="Enter your email"
            class="w-full px-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all"
          >
        </div>

        <!-- Password Field -->
        <div class="mb-4">
          <label class="block text-sm text-gray-200 mb-2">Password</label>
          <input 
            type="password" 
            [(ngModel)]="password"
            placeholder="••••••••••••"
            class="w-full px-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all"
          >
        </div>

        <!-- Confirm Password Field -->
        <div class="mb-6">
          <label class="block text-sm text-gray-200 mb-2">Confirm Password</label>
          <input 
            type="password" 
            [(ngModel)]="confirmPassword"
            placeholder="••••••••••••"
            class="w-full px-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all"
          >
        </div>

        <!-- Sign Up Button -->
        <button 
          (click)="onSubmit()"
          [disabled]="isLoading"
          class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-xl transition-all transform hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span *ngIf="!isLoading">SIGN UP</span>
          <span *ngIf="isLoading">Creating account...</span>
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-4 my-6">
          <div class="flex-1 h-px bg-white/30"></div>
          <span class="text-sm text-gray-300">or</span>
          <div class="flex-1 h-px bg-white/30"></div>
        </div>

        <!-- OAuth Buttons -->
        <div class="space-y-3">
          <!-- Google Sign Up -->
          <button 
            (click)="signupWithGoogle()"
            class="w-full py-3 bg-white hover:bg-gray-100 text-gray-700 font-medium rounded-xl transition-all flex items-center justify-center gap-3"
          >
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
          </button>

        </div>

        <!-- Login Link -->
        <p class="mt-6 text-center text-sm text-gray-300">
          Already have an account? 
          <a routerLink="/login" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">
            Sign In
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
