<div class="min-h-screen bg-[#f0f2f5] p-6">
  <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-500 to-blue-600 p-6 text-white flex items-center justify-between">
      <div class="flex items-center gap-4">
        <button (click)="goBack()" class="p-2 hover:bg-white/20 rounded-lg transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
          </svg>
        </button>
        <h1 class="text-2xl font-bold">Profile Settings</h1>
      </div>
      <button (click)="logout()" class="px-4 py-2 bg-red-500 hover:bg-red-600 rounded-lg text-sm font-medium transition-colors">
        Logout
      </button>
    </div>

    <div class="p-8">
      <!-- Success/Error Messages -->
      <div *ngIf="successMessage" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-xl text-green-700">
        {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700">
        {{ errorMessage }}
      </div>

      <!-- Avatar Upload -->
      <div class="flex flex-col items-center mb-8">
        <div class="relative group">
          <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-blue-100 shadow-lg">
            <img [src]="avatar" alt="Profile" class="w-full h-full object-cover">
          </div>
          <label for="avatar-upload" class="absolute bottom-0 right-0 w-10 h-10 bg-blue-500 hover:bg-blue-600 rounded-full flex items-center justify-center cursor-pointer shadow-lg transition-transform group-hover:scale-110">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
          </label>
          <input 
            type="file" 
            id="avatar-upload" 
            accept="image/*"
            (change)="onFileSelected($event)"
            class="hidden"
          >
        </div>
        <p class="mt-4 text-sm text-gray-500">Click the camera icon to upload new avatar</p>
        <p class="text-xs text-gray-400">Max file size: 5MB</p>
      </div>

      <!-- Form Fields -->
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
          <input 
            type="text" 
            [(ngModel)]="username"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            placeholder="Enter your username"
          >
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input 
            type="email" 
            [(ngModel)]="email"
            disabled
            class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-500 cursor-not-allowed"
          >
          <p class="mt-1 text-xs text-gray-400">Email cannot be changed</p>
        </div>
      </div>

      <!-- Save Button -->
      <div class="mt-8">
        <button 
          (click)="updateProfile()"
          [disabled]="isLoading"
          class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span *ngIf="!isLoading">Save Changes</span>
          <span *ngIf="isLoading">Saving...</span>
        </button>
      </div>
    </div>
  </div>
</div>
