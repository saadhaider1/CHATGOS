<div class="flex flex-col h-full items-center py-8 gap-8">
  <!-- Logo -->
  <div class="text-[#3b82f6] font-bold text-xl mb-4">ChatGos.</div>

  <!-- Profile Avatar -->
  <div class="relative group cursor-pointer" (click)="goToProfile()" title="Click to view profile">
    <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-blue-100 hover:border-blue-300 transition-colors">
      <img [src]="userAvatar" alt="Profile" class="w-full h-full object-cover">
    </div>
    <div 
      class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-white cursor-pointer"
      [class.bg-green-500]="isOnline"
      [class.bg-gray-400]="!isOnline"
      (click)="toggleStatus(); $event.stopPropagation()"
      [title]="isOnline ? 'Click to go offline' : 'Click to go online'"
    ></div>
  </div>

  <!-- Navigation -->
  <nav class="flex flex-col gap-6 flex-1">
    <button 
      *ngFor="let item of navItems"
      (click)="navigate(item.route)"
      class="p-2 rounded-xl transition-all text-2xl relative"
      [class.text-blue-600]="item.active"
      [class.bg-blue-50]="item.active"
      [class.text-gray-400]="!item.active"
      [class.hover:bg-gray-50]="!item.active"
      [title]="item.label"
    >
      {{ item.icon }}
      <!-- Unread badge for notifications -->
      <span 
        *ngIf="item.route === '/notifications' && unreadCount > 0"
        class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-bold"
      >
        {{ unreadCount }}
      </span>
    </button>
  </nav>

  <!-- Bottom Actions -->
  <div class="flex flex-col gap-6 mt-auto">
    <button 
      (click)="navigate('/settings')"
      class="p-2 text-gray-400 rounded-xl hover:bg-gray-50 hover:text-blue-500 transition-colors text-2xl"
      title="Settings"
      [class.text-blue-600]="currentRoute === '/settings'"
      [class.bg-blue-50]="currentRoute === '/settings'"
    >
      ⚙️
    </button>
    <button 
      (click)="logout()"
      class="p-2 text-red-400 rounded-xl hover:bg-red-50 transition-colors text-2xl"
      title="Logout"
    >
      🚪
    </button>
  </div>
</div>
