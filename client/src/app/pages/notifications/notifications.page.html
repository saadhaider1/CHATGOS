<div class="flex h-screen w-full bg-[#f0f2f5] p-6">
  <!-- Sidebar -->
  <app-sidebar class="w-20 border-r border-gray-100 flex-shrink-0 flex flex-col"></app-sidebar>

  <!-- Main Content -->
  <div class="flex-1 ml-6 bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col">
    <!-- Header -->
    <div class="p-6 border-b border-gray-100 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <h2 class="text-2xl font-bold text-gray-800">Notifications</h2>
        <span 
          *ngIf="unreadCount > 0"
          class="bg-red-500 text-white text-xs px-2 py-1 rounded-full font-medium"
        >
          {{ unreadCount }}
        </span>
      </div>
      <button 
        *ngIf="unreadCount > 0"
        (click)="markAllAsRead()"
        class="text-sm text-blue-500 hover:text-blue-600 font-medium transition-colors"
      >
        Mark all as read
      </button>
    </div>

    <!-- Notifications List -->
    <div class="flex-1 overflow-y-auto">
      <div *ngIf="notifications.length === 0" class="flex flex-col items-center justify-center h-full text-gray-400">
        <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
        </svg>
        <p>No notifications yet</p>
      </div>

      <div class="divide-y divide-gray-100">
        <div 
          *ngFor="let notification of notifications"
          (click)="markAsRead(notification)"
          class="p-6 hover:bg-gray-50 cursor-pointer transition-colors flex items-start gap-4"
          [class.bg-blue-50]="!notification.read"
        >
          <!-- Icon or Avatar -->
          <div class="flex-shrink-0">
            <div *ngIf="notification.avatar" class="w-12 h-12 rounded-full overflow-hidden">
              <img [src]="notification.avatar" alt="" class="w-full h-full object-cover">
            </div>
            <div 
              *ngIf="!notification.avatar" 
              class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-2xl"
            >
              {{ getIcon(notification.type) }}
            </div>
          </div>

          <!-- Content -->
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between gap-2">
              <div>
                <h3 class="font-semibold text-gray-900" [class.text-blue-600]="!notification.read">
                  {{ notification.title }}
                </h3>
                <p class="text-sm text-gray-600 mt-1">{{ notification.message }}</p>
              </div>
              <span class="text-xs text-gray-400 whitespace-nowrap">
                {{ getTimeAgo(notification.timestamp) }}
              </span>
            </div>
          </div>

          <!-- Unread Indicator & Delete -->
          <div class="flex items-center gap-2">
            <div 
              *ngIf="!notification.read" 
              class="w-2 h-2 bg-blue-500 rounded-full"
            ></div>
            <button 
              (click)="deleteNotification(notification, $event)"
              class="p-1 text-gray-400 hover:text-red-500 transition-colors"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
