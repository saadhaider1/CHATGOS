<div class="flex items-center gap-4 px-6 py-4 hover:bg-gray-50 cursor-pointer transition-colors relative">
  <!-- Avatar -->
  <div class="relative">
    <div class="w-12 h-12 rounded-full overflow-hidden">
      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Devi" alt="Avatar" class="w-full h-full object-cover">
    </div>
    <div class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-white" [class.bg-green-500]="isOnline" [class.bg-gray-400]="!isOnline"></div>
  </div>

  <!-- Content -->
  <div class="flex-1 min-w-0 border-b border-gray-50 pb-4 mt-4">
    <div class="flex justify-between items-baseline mb-1">
      <h3 class="text-sm font-semibold text-gray-900 truncate">Devi K</h3>
      <span class="text-[10px] text-gray-400">8:21 pm</span>
    </div>
    <p class="text-xs text-gray-500 truncate">Nen kuda inka ah movie chudale...</p>
  </div>

  <!-- Unread/Active indicator (Optional) -->
  <div class="absolute right-6 top-1/2 -translate-y-1/2 flex flex-col items-center gap-1">
    <!-- Unread count or blue dot could go here -->
  </div>
</div>
